<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Templates Showcase</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const layoutsData = [
            { id: 'top_navigation', name: 'Top Navigation', icon: 'bi-window-sidebar', description: 'A sleek, sticky header with branding and an interactive profile dropdown menu.' },
            { id: 'login', name: 'Login Overlay', icon: 'bi-box-arrow-in-right', description: 'A dark, modern authentication screen with a beautifully centered login card.' },
            { id: 'dashboard', name: 'Dashboard Shell', icon: 'bi-grid-1x2', description: 'The core layout for internal portals, featuring a header and a structured content container.' },
            { id: 'forms', name: 'Standard Form', icon: 'bi-ui-radios', description: 'A robust, two-column form layout inside a floating card with submission feedback.' }
        ];

        const App = () => {
            const [selectedLayout, setSelectedLayout] = useState(null);
            const [framework, setFramework] = useState('tailwind'); // 'tailwind' or 'inline_css'
            const [device, setDevice] = useState('desktop'); // 'desktop' or 'mobile'

            // --- GALLERY VIEW ---
            if (!selectedLayout) {
                return (
                    <div className="min-h-screen flex flex-col relative">
                        <div className="fixed inset-0 overflow-hidden pointer-events-none -z-10">
                            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-100/40 rounded-full blur-[100px]"></div>
                        </div>
                        
                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
                            <div className="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <a href="../index.html" className="w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-500 hover:text-brand-600 rounded-full transition-colors shadow-sm">
                                        <i className="bi bi-arrow-left text-lg"></i>
                                    </a>
                                    <h1 className="text-xl font-bold text-slate-800">Layout Templates Showcase</h1>
                                </div>
                            </div>
                        </header>
                        
                        <main className="flex-grow max-w-6xl mx-auto w-full px-6 py-12 animate-fade-in z-10">
                            <div className="mb-12 text-center">
                                <h2 className="text-4xl font-bold text-slate-900 mb-4 tracking-tight">Select a Layout to Preview</h2>
                                <p className="text-slate-500 text-lg max-w-2xl mx-auto">Explore our standardized layouts. Each layout comes with responsive Tailwind HTML and dependency-free Inline CSS versions.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {layoutsData.map(layout => (
                                    <div 
                                        key={layout.id}
                                        onClick={() => { setSelectedLayout(layout); setFramework('tailwind'); setDevice('desktop'); }}
                                        className="group bg-white border border-slate-200 hover:border-brand-400 rounded-3xl p-8 shadow-sm hover:shadow-2xl hover:shadow-brand-500/10 transition-all duration-300 cursor-pointer relative overflow-hidden flex flex-col h-full"
                                    >
                                        <div className="absolute top-0 right-0 w-40 h-40 bg-brand-50 rounded-bl-[120px] -z-10 transition-transform duration-500 group-hover:scale-[1.5]"></div>
                                        <div className="w-16 h-16 bg-gradient-to-br from-brand-100 to-indigo-100 text-brand-600 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-inner border border-white">
                                            <i className={`bi ${layout.icon}`}></i>
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-900 mb-3">{layout.name}</h3>
                                        <p className="text-slate-500 mb-8 leading-relaxed flex-grow">{layout.description}</p>
                                        
                                        <div className="flex items-center justify-between">
                                            <div className="flex gap-2">
                                                <span className="px-2.5 py-1 bg-slate-100 text-slate-500 text-xs font-semibold rounded-md border border-slate-200 group-hover:border-brand-200 group-hover:bg-brand-50 transition-colors">Tailwind</span>
                                                <span className="px-2.5 py-1 bg-slate-100 text-slate-500 text-xs font-semibold rounded-md border border-slate-200 group-hover:border-brand-200 group-hover:bg-brand-50 transition-colors">Inline CSS</span>
                                            </div>
                                            <div className="flex items-center text-brand-600 font-bold group-hover:gap-2 transition-all gap-1 text-sm bg-brand-50 px-4 py-2 rounded-xl group-hover:bg-brand-600 group-hover:text-white">
                                                Preview <i className="bi bi-arrow-right"></i>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- PREVIEW VIEW ---
            const iframeSrc = `../layouts/${framework}/${selectedLayout.id}.html`;
            const githubBaseUrl = "https://github.com/tony-jjjentinc/automation-designs/blob/main/layouts";
            const githubUrl = `${githubBaseUrl}/${framework}/${selectedLayout.id}.html`;

            return (
                <div className="h-screen flex flex-col bg-slate-900 animate-fade-in overflow-hidden">
                    {/* Top Toolbar */}
                    <header className="bg-slate-800 border-b border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-4 z-40 shrink-0 shadow-lg">
                        
                        <div className="flex items-center gap-4">
                            <button onClick={() => setSelectedLayout(null)} className="text-slate-300 hover:text-white transition-colors flex items-center gap-2 bg-slate-700/50 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-600">
                                <i className="bi bi-arrow-left"></i> Return to gallery
                            </button>
                            <div className="w-px h-6 bg-slate-600 hidden sm:block"></div>
                            <h2 className="text-white font-semibold flex items-center gap-2 text-sm sm:text-base">
                                <i className={`bi ${selectedLayout.icon} text-brand-400`}></i> {selectedLayout.name}
                            </h2>
                        </div>

                        {/* Middle Controls (Framework & Device) */}
                        <div className="flex items-center gap-2 sm:gap-6">
                            {/* Framework Toggle */}
                            <div className="flex bg-slate-900 rounded-lg p-1 shadow-inner border border-slate-700">
                                <button 
                                    onClick={() => setFramework('inline_css')}
                                    className={`px-3 sm:px-4 py-1.5 rounded-md text-xs sm:text-sm font-medium transition-all ${framework === 'inline_css' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    CSS
                                </button>
                                <button 
                                    onClick={() => setFramework('tailwind')}
                                    className={`px-3 sm:px-4 py-1.5 rounded-md text-xs sm:text-sm font-medium transition-all ${framework === 'tailwind' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    Tailwind
                                </button>
                            </div>

                            {/* Device Toggle */}
                            <div className="flex bg-slate-900 rounded-lg p-1 shadow-inner border border-slate-700 hidden md:flex">
                                <button 
                                    onClick={() => setDevice('desktop')}
                                    className={`px-3 py-1.5 rounded-md transition-all flex items-center gap-2 ${device === 'desktop' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                    title="Desktop View"
                                >
                                    <i className="bi bi-display"></i>
                                </button>
                                <button 
                                    onClick={() => setDevice('mobile')}
                                    className={`px-3 py-1.5 rounded-md transition-all flex items-center gap-2 ${device === 'mobile' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                    title="Mobile View"
                                >
                                    <i className="bi bi-phone"></i>
                                </button>
                            </div>
                        </div>

                        {/* Right Actions */}
                        <div className="flex items-center gap-2 sm:gap-3">
                            <a 
                                href={githubUrl} 
                                target="_blank" 
                                className="text-slate-300 hover:text-white transition-colors flex items-center gap-2 px-3 py-1.5 text-xs sm:text-sm font-medium border border-slate-600 rounded-lg hover:bg-slate-700"
                            >
                                <i className="bi bi-github"></i> <span className="hidden sm:inline">Source Code</span>
                            </a>
                            <a 
                                href={iframeSrc}
                                target="_blank"
                                className="bg-brand-600 hover:bg-brand-500 text-white transition-colors flex items-center justify-center w-8 h-8 sm:w-auto sm:px-3 sm:py-1.5 text-sm font-medium rounded-lg shadow-md"
                                title="Open Full Screen"
                            >
                                <i className="bi bi-arrows-fullscreen"></i> <span className="hidden sm:inline ml-2">Full Screen</span>
                            </a>
                        </div>
                    </header>

                    {/* Iframe Canvas Area */}
                    <main className="flex-grow flex items-center justify-center p-2 sm:p-4 md:p-8 relative bg-slate-950 overflow-hidden" style={{backgroundImage: "url('https://www.transparenttextures.com/patterns/carbon-fibre.png')"}}>
                        <div 
                            className={`h-full bg-white transition-all duration-500 ease-in-out shadow-[0_0_50px_rgba(0,0,0,0.5)] relative flex flex-col ${device === 'mobile' ? 'w-[420px] rounded-[2rem] border-8 border-slate-800' : 'w-full rounded-xl border border-slate-700'}`}
                        >
                            {/* Fake mobile notch for flair */}
                            {device === 'mobile' && (
                                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-xl z-50"></div>
                            )}
                            <iframe 
                                src={iframeSrc} 
                                className={`w-full h-full ${device === 'mobile' ? 'rounded-[1.5rem]' : 'rounded-xl'} border-none bg-white`}
                                title="Layout Preview"
                            ></iframe>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
