<!--
  UI Component: Data Cards
  Description: Simple and stylized cards for containing standalone info, dashboard stats, or lists.
-->

<!-- Basic Info Card -->
<div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm hover:shadow-md transition-shadow max-w-sm">
  <h3 class="text-lg font-bold text-slate-800 mb-2">Basic Info Card</h3>
  <p class="text-sm text-slate-500 mb-6">Simple cards are excellent for containing standalone content, dashboard widgets, or grid lists.</p>
  <button class="text-brand-600 text-sm font-bold hover:text-brand-800 transition-colors">Action Link &rarr;</button>
</div>

<!-- Stat Card with Icon & Badge -->
<div class="border border-slate-200 rounded-2xl p-6 bg-white shadow-sm flex flex-col justify-between group cursor-pointer hover:border-brand-300 transition-colors max-w-sm mt-6">
  <div class="flex justify-between items-start mb-4">
    <!-- Icon Container -->
    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xl">
      <i class="bi bi-graph-up-arrow"></i>
    </div>
    <!-- Small Trend Badge -->
    <span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-lg text-xs font-bold">+14%</span>
  </div>
  <div>
    <!-- Main Statistic Number -->
    <div class="text-3xl font-bold text-slate-900 mb-1">45,231</div>
    <div class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Total Active Users</div>
  </div>
</div>
