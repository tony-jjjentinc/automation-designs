<!--
  Layout Module: Glassmorphic Modal / Login Overlay
  Description: A sleek, blurred background overlay containing a centered authentication card with interactive inputs.
  Usage: In React, wrap this around your initial app rendering using `fixed inset-0`.
-->
<div class="fixed inset-0 flex flex-col justify-center items-center bg-slate-100/60 backdrop-blur-md z-50 p-4">
  <!-- Decorative background blur element (optional) -->
  <div class="absolute top-0 left-0 w-64 h-64 bg-brand-200/40 rounded-full blur-[80px] pointer-events-none"></div>
  
  <img src="../assets/images/jjjei2.png" alt="Logo" class="h-24 object-contain mb-6 drop-shadow-xl z-10" />
  
  <!-- Main Auth Card -->
  <div class="w-full max-w-sm p-8 bg-white/90 backdrop-blur-2xl border border-slate-200 rounded-3xl shadow-xl z-10">
    <h4 class="text-xl font-bold text-center text-slate-900 mb-6 tracking-tight">System Login</h4>
    
    <!-- Login Form Fields -->
    <div class="space-y-4">
      <div>
        <label class="block text-slate-500 text-xs font-bold uppercase tracking-wider mb-2">Email Address</label>
        <input type="email" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm shadow-sm" placeholder="name@company.com" />
      </div>
      <button class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/30 transition-all text-sm">
        Login <i class="bi bi-arrow-right-short text-lg leading-none align-middle"></i>
      </button>
    </div>
  </div>
</div>
