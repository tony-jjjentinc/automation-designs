<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Demo - Uptime</title>
  <base target="_top">
  <style>
    :root {
      /* User configurable brand background */
      --background-brand: #9FC5E8; /* default slate-50 */
    }
  </style>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            },
            'background-brand': 'var(--background-brand)'
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-background-brand text-slate-800 font-sans antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const dummyAuthApi = async (email, password) => {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (email === "user@example.com" && password === "password") {
            resolve({ status: "success", token: "gas-session-xyz", user: "Jane Monitor" });
          } else {
            reject(new Error("Invalid credentials"));
          }
        }, 800);
      });
    };

    const LoginOverlay = ({ onLogin }) => {
      const [email, setEmail] = useState("user@example.com");
      const [password, setPassword] = useState("password");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError("");
        
        try {
          const response = await dummyAuthApi(email, password);
          if (response.status === "success") {
            localStorage.setItem("sessionToken", response.token);
            onLogin(response.user);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 flex flex-col justify-center items-center bg-background-brand z-50 p-4">
          <img src="../../assets/images/jjjei2.png" alt="Logo" className="h-16 object-contain mb-6 animate-fade-in z-10" />
          
          <div className="w-full max-w-md p-8 bg-white border border-slate-200 rounded-xl shadow-md animate-slide-up z-10">
            <h4 className="text-xl font-medium text-center text-slate-900 mb-1 tracking-tight">Equipment Runtime Hours System</h4>
            <p className="text-xs text-center text-slate-500 mb-6">2026 - v3.2</p>
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-600 p-3 rounded-md text-center text-sm font-medium mb-6 animate-fade-in flex items-center justify-center gap-2">
                <i className="bi bi-exclamation-triangle-fill"></i> {error}
              </div>
            )}
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <input type="email" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-md focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-slate-900 placeholder-slate-400 outline-none transition-all" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" required />
              </div>
              <div>
                <input type="password" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-md focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-slate-900 placeholder-slate-400 outline-none transition-all" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" required />
              </div>
              <button type="submit" className="w-full py-3 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-medium rounded-md transition-all duration-200 mt-2" disabled={loading}>
                {loading ? "Logging In..." : "Login"}
              </button>
            </form>

            <div className="mt-6 text-center text-sm text-slate-500 bg-slate-50 py-2 rounded-md border border-slate-100">
              <span className="block mb-1 text-xs uppercase tracking-wider font-bold text-slate-400">Demo Credentials</span>
              <span className="font-medium text-slate-700">user@example.com</span> / <span className="font-medium text-slate-700">password</span>
            </div>
          </div>
        </div>
      );
    };

    const TopNav = ({ user, onLogout }) => {
      const [showDropdown, setShowDropdown] = useState(false);
      return (
        <header className="flex justify-between items-center px-6 py-4 bg-white/90 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40 shadow-sm">
          <div className="flex items-center gap-3">
            <img src="../../assets/images/jjjei2.png" alt="Logo" className="h-8 object-contain" />
          </div>
          
          <div className="relative group">
            <div className="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-slate-50 transition-colors cursor-pointer border border-transparent hover:border-slate-200" onClick={() => setShowDropdown(!showDropdown)}>
              <div className="hidden md:block text-right">
                <div className="text-sm font-semibold text-slate-800 leading-tight">{user}</div>
                <div className="text-xs text-brand-600 font-medium">Administrator</div>
              </div>
              <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md text-sm border border-brand-700/20">
                {user ? user.charAt(0) : 'A'}
              </div>
              <i className="bi bi-chevron-down text-slate-400 text-xs ml-1 transition-transform duration-200" style={{ transform: showDropdown ? 'rotate(180deg)' : 'rotate(0)' }}></i>
            </div>
            {showDropdown && (
              <div className="absolute right-0 mt-3 w-56 bg-white border border-slate-200 rounded-xl shadow-xl py-2 animate-slide-down z-50 origin-top-right">
                <div className="px-4 py-3 border-b border-slate-100 mb-2 md:hidden">
                  <div className="text-sm font-bold text-slate-800">{user}</div>
                  <div className="text-xs text-brand-600">Administrator</div>
                </div>
                <button className="w-full text-left px-4 py-2.5 text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors flex items-center gap-3 text-sm font-medium" onClick={onLogout}>
                  <i className="bi bi-box-arrow-right text-lg"></i> Sign Out
                </button>
              </div>
            )}
          </div>
        </header>
      );
    };

    const UptimeDashboard = () => {
      const equipment = [
        { id: "EQ-01", name: "Main Server Router", uptime: 99.99, status: "Operational", trend: "up" },
        { id: "EQ-02", name: "HVAC System A", uptime: 98.50, status: "Operational", trend: "down" },
        { id: "EQ-03", name: "Backup Generator", uptime: 100, status: "Standby", trend: "flat" },
        { id: "EQ-04", name: "Security Gate Proxy", uptime: 92.10, status: "Degraded", trend: "down" },
        { id: "EQ-05", name: "Network Switch C", uptime: 99.85, status: "Operational", trend: "up" },
      ];

      return (
        <main className="max-w-7xl mx-auto p-4 md:p-8 flex-grow animate-fade-in z-10 w-full relative">
          <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-100/40 rounded-full blur-[100px] pointer-events-none -z-10"></div>
          
          <div className="mb-8">
            <h1 className="text-3xl font-bold text-slate-900 tracking-tight">Uptime Monitoring</h1>
            <p className="text-slate-500">Real-time equipment reliability and performance metrics.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm flex flex-col justify-center">
              <div className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">System Health</div>
              <div className="text-4xl font-bold text-brand-600 flex items-center gap-3">
                98.8% <i className="bi bi-activity text-2xl text-emerald-500 animate-pulse-slow"></i>
              </div>
              <div className="text-sm text-emerald-600 font-medium mt-2"><i className="bi bi-arrow-up-right"></i> +0.2% from last month</div>
            </div>
            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm flex flex-col justify-center">
              <div className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Active Incidents</div>
              <div className="text-4xl font-bold text-slate-800">1</div>
              <div className="text-sm text-amber-600 font-medium mt-2">Investigating EQ-04 degraded performance</div>
            </div>
            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm flex flex-col justify-center">
              <div className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Monitored Assets</div>
              <div className="text-4xl font-bold text-slate-800">142</div>
              <div className="text-sm text-slate-500 font-medium mt-2">Across 6 facilities</div>
            </div>
          </div>

          <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
            <h3 className="text-xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-4">Critical Infrastructure</h3>
            <div className="space-y-6">
              {equipment.map(eq => (
                <div key={eq.id}>
                  <div className="flex justify-between items-end mb-2">
                    <div>
                      <div className="font-bold text-slate-800">{eq.name}</div>
                      <div className="text-xs text-slate-400 font-mono">{eq.id}</div>
                    </div>
                    <div className="text-right">
                      <div className={`font-bold ${eq.uptime < 95 ? 'text-amber-600' : 'text-emerald-600'}`}>{eq.uptime}%</div>
                      <div className="text-xs font-medium text-slate-500">{eq.status}</div>
                    </div>
                  </div>
                  <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                    <div 
                      className={`h-2.5 rounded-full ${eq.uptime < 95 ? 'bg-amber-500' : 'bg-emerald-500'}`} 
                      style={{ width: `${eq.uptime}%` }}
                    ></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </main>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      return (
        <React.Fragment>
          {!user ? (
            <LoginOverlay onLogin={setUser} />
          ) : (
            <div className="min-h-screen flex flex-col relative bg-transparent">
              <TopNav user={user} onLogout={() => setUser(null)} />
              <UptimeDashboard />
            </div>
          )}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
