<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJJEI Design Guide</title>
  
  <base target="_top">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb', 
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
            dept: {
              arch: '#9FC5E8',
              admin: '#010AFD',
              design: '#4A70A0',
              electrical: '#4A86E8',
              mechanical: '#001166',
              plumbing: '#BEE0E9',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-brand-100 overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const ShowcaseCard = ({ title, description, link, icon, badge, githubLink }) => (
      <div className="group bg-white border border-slate-200 rounded-3xl p-6 h-full transition-all duration-300 hover:shadow-xl hover:-translate-y-1 hover:border-brand-300 flex flex-col relative overflow-hidden">          
        <div className="flex justify-between items-start mb-4">
          <div className="w-12 h-12 bg-slate-50 border border-slate-100 rounded-2xl flex items-center justify-center text-brand-600 shadow-sm group-hover:bg-brand-50 transition-colors">
            <i className={`bi ${icon} text-xl`}></i>
          </div>
          {badge && (
            <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1 rounded-full text-xs font-bold shadow-sm">
              {badge}
            </span>
          )}
        </div>
        
        <h3 className="text-lg font-bold text-slate-900 mb-2 tracking-tight group-hover:text-brand-600 transition-colors">{title}</h3>
        <p className="text-slate-500 text-sm leading-relaxed flex-grow mb-6">{description}</p>
        
        <div className="flex items-center gap-3 mt-auto">
          <a href={link} className="flex-1 bg-brand-50 hover:bg-brand-100 text-brand-700 font-semibold py-2.5 px-3 rounded-xl text-center text-sm transition-colors border border-brand-200 flex items-center justify-center gap-1.5">
            View <i className="bi bi-arrow-right"></i>
          </a>
          {githubLink && (
            <a href={githubLink} target="_blank" rel="noopener noreferrer" className="flex-1 bg-brand-50 hover:bg-brand-100 text-brand-700 font-semibold py-2.5 px-3 rounded-xl text-center text-sm transition-colors border border-brand-200 flex items-center justify-center gap-1.5">
              <i className="bi bi-github"></i> Source
            </a>
          )}
        </div>
      </div>
    );

    const CodeSnippet = ({ code, language }) => {
      const [copied, setCopied] = useState(false);
      
      const copyToClipboard = () => {
        navigator.clipboard.writeText(code);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="relative rounded-2xl overflow-hidden border border-slate-700 shadow-lg bg-slate-900 my-4 group">
          <div className="flex justify-between items-center px-4 py-2 bg-slate-800/80 border-b border-slate-700/50">
            <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{language}</span>
            <button 
              onClick={copyToClipboard}
              className="text-slate-400 hover:text-white transition-colors text-sm"
              title="Copy to clipboard"
            >
              <i className={`bi ${copied ? 'bi-check-lg text-emerald-400' : 'bi-clipboard'}`}></i>
            </button>
          </div>
          <div className="p-4 overflow-x-auto">
            <pre className="text-sm font-mono text-slate-300">
              <code>{code}</code>
            </pre>
          </div>
        </div>
      );
    };

    const ColorSwatch = ({ name, hex }) => (
      <div className="flex items-center gap-4 p-3 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md transition-shadow">
        <div className="w-12 h-12 rounded-lg shadow-inner border border-slate-200/50" style={{ backgroundColor: hex }}></div>
        <div>
          <div className="font-bold text-slate-800 text-sm">{name}</div>
          <div className="text-slate-500 font-mono text-xs">{hex}</div>
        </div>
      </div>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('home');

      return (
        <div className="min-h-screen flex flex-col relative bg-slate-50">
          <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-blue-100/40 rounded-full blur-[100px] pointer-events-none -z-10"></div>
          
          <header className="px-6 md:px-12 py-5 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40">
            <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
              <img src="./assets/images/jjjei2.png" alt="Logo" className="h-8 object-contain drop-shadow-sm" />
              
              <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner border border-slate-200">
                <button 
                  className={`px-6 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'home' ? 'bg-white text-brand-600 shadow-sm border border-slate-200/50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}
                  onClick={() => setActiveTab('home')}
                >
                  <i className="bi bi-house-door mr-2"></i> Home
                </button>
                <button 
                  className={`px-6 py-2 rounded-lg text-sm font-semibold transition-all ${activeTab === 'info' ? 'bg-white text-brand-600 shadow-sm border border-slate-200/50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}
                  onClick={() => setActiveTab('info')}
                >
                  <i className="bi bi-info-circle mr-2"></i> Information + Rules
                </button>
              </div>
            </div>
          </header>

          <main className="flex-grow w-full max-w-6xl mx-auto p-6 md:p-12 animate-fade-in z-10">
            
            {activeTab === 'home' && (
              <div className="animate-slide-up space-y-12">
                <div className="text-center max-w-3xl mx-auto pt-8 pb-4">
                  <h1 className="text-4xl md:text-5xl font-bold text-slate-900 tracking-tight mb-4 leading-tight">
                    JJJEI Web App Design Guides
                  </h1>
                  <p className="text-lg text-slate-500 leading-relaxed">
                    Repository of resources and guides to standardize the design of Web Applications built with Google Apps Script. Featuring design templates and reusable UI component, complete with source codes.
                  </p>
                </div>

                <div>
                  <div className="flex items-center gap-3 mb-6 border-b border-slate-200 pb-2">
                    <h2 className="text-2xl font-bold text-slate-800">Demonstrations</h2>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <ShowcaseCard 
                      title="Dashboard (Uptime)" 
                      description="Simulated dashboard focusing on equipment uptime, data visualization, and status metrics."
                      link="./demo/dashboard_page/index.html"
                      icon="bi-speedometer2"
                      badge="New Demo"
                      githubLink="https://github.com/tony-jjjentinc/automation-designs/tree/main/demo/dashboard_page"
                    />
                    <ShowcaseCard 
                      title="Equipment Management" 
                      description="A robust management interface allowing listing, filtering, and addition of new hardware assets."
                      link="./demo/management_page/index.html"
                      icon="bi-table"
                      badge="Interactive"
                      githubLink="https://github.com/tony-jjjentinc/automation-designs/tree/main/demo/management_page"
                    />
                    <ShowcaseCard 
                      title="Equipment Status Form" 
                      description="A stylized data entry form for submitting equipment status reports."
                      link="./demo/forms_page/index.html"
                      icon="bi-ui-radios"
                      badge="Forms"
                      githubLink="https://github.com/tony-jjjentinc/automation-designs/tree/main/demo/forms_page"
                    />
                  </div>
                </div>

                <div>
                  <div className="flex items-center gap-3 mb-6 border-b border-slate-200 pb-2">
                    <h2 className="text-2xl font-bold text-slate-800">Templates & Resources</h2>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                    <ShowcaseCard 
                      title="UI Components" 
                      description="Buttons, Inputs, Dropdowns, and Badges."
                      link="./templates/ui_components.html"
                      icon="bi-puzzle"
                    />
                    <ShowcaseCard 
                      title="Layout Modules" 
                      description="Navbars, Overlays, and Structural Shells."
                      link="./templates/layouts.html"
                      icon="bi-layout-sidebar-reverse"
                    />
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'info' && (
              <div className="animate-slide-up space-y-12">
                
                <section>
                  <h2 className="text-3xl font-bold text-slate-900 mb-4 tracking-tight">Setup Guidelines & Rules</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed text-lg">
                    This guide establishes the standard for all future Web Applications deployed via Google Apps Script within our organization.
                  </p>
                  
                  <div className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
                    <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                      <i className="bi bi-stack text-brand-600"></i> Core Technologies
                    </h3>
                    <p className="text-slate-600 mb-4">
                      The officially recommended technology stack prioritizes performance, visual excellence, and compatibility with GAS constraints (single-file deployments).
                    </p>
                    <ul className="space-y-3 mb-6">
                      <li className="flex items-start gap-3">
                        <i className="bi bi-check-circle-fill text-brand-500 mt-0.5"></i>
                        <div>
                          <strong className="text-slate-800">Styling: Tailwind CSS via CDN.</strong> Enables rapid, premium UI creation without requiring a build step.
                        </div>
                      </li>
                      <li className="flex items-start gap-3">
                        <i className="bi bi-check-circle-fill text-brand-500 mt-0.5"></i>
                        <div>
                          <strong className="text-slate-800">Rendering: React.js + Babel via CDN.</strong> Allows component-driven architecture and state management directly in the browser.
                        </div>
                      </li>
                    </ul>
                    
                    <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mt-6">
                      <h4 className="font-bold text-amber-800 mb-2 flex items-center gap-2"><i className="bi bi-info-circle"></i> Acceptable Alternatives</h4>
                      <p className="text-sm text-amber-700 leading-relaxed">
                        If React or Tailwind are not feasible for a specific legacy project, the following are acceptable fallbacks: <strong>Bootstrap 5</strong> for grid and components, and <strong>Vanilla JavaScript / CSS</strong> for simple logic and styling. However, the modern stack is strongly preferred for new initiatives.
                      </p>
                    </div>
                  </div>
                </section>

                <section>
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">Initial Setup Snippet</h3>
                  <p className="text-slate-600 mb-4">Copy and paste these scripts into the `head` of your `index.html` file to initialize the environment.</p>
                  
                  <CodeSnippet 
                    language="HTML" 
                    code={`<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"><\/script>

<!-- React & ReactDOM -->
<script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>

<!-- Babel for in-browser JSX -->
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">`}
                  />
                </section>

                <section>
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">Department Color Codes</h3>
                  <p className="text-slate-600 mb-6">When developing portals for specific departments and sub-departments, use the following hex codes for primary branding accents (e.g., buttons, active states, borders).</p>
                  
                  <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                      <ColorSwatch name="GMO" hex="#008000" />
                      <ColorSwatch name="Admin" hex="#FFD700" />
                      <ColorSwatch name="Facilities (Main)" hex="#0000FF" />
                      <ColorSwatch name="Leasing" hex="#800000" />
                      <ColorSwatch name="HR" hex="#800080" />
                      <ColorSwatch name="Procurement & Inventory" hex="#C08081" />
                      <ColorSwatch name="Controller" hex="#008080" />
                      <ColorSwatch name="Treasury" hex="#F28500" />
                    </div>

                    <div className="bg-slate-100 p-6 rounded-2xl border border-slate-200">
                      <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-[#0000FF]"></div> Facilities Sub-departments
                      </h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        <ColorSwatch name="Architectural, Civil, & Structural" hex="#9FC5E8" />
                        <ColorSwatch name="Admin Operations" hex="#010AFD" />
                        <ColorSwatch name="Design and Projects" hex="#4A70A0" />
                        <ColorSwatch name="Electrical and Electronics" hex="#4A86E8" />
                        <ColorSwatch name="Mechanical" hex="#001166" />
                        <ColorSwatch name="Plumbing" hex="#BEE0E9" />
                      </div>
                    </div>
                  </div>
                </section>

              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
