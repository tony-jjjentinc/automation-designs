<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Inline CSS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; }
        * { box-sizing: border-box; }
        .btn:hover { background-color: #0369a1; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 40;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei2.png" alt="Logo" style="height: 32px; object-fit: contain; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));" />
      </div>
      <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(to top right, #0284c7, #4f46e5); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid rgba(3, 105, 161, 0.2);">
        A
      </div>
    </header>
    
    <main style="flex-grow: 1; padding: 24px; width: 100%; max-width: 1024px; margin: 0 auto; z-index: 10;">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
        <div>
          <h1 style="font-size: 24px; font-weight: bold; color: #0f172a; margin: 0;">Page Title</h1>
          <p style="color: #64748b; font-size: 14px; margin: 4px 0 0 0;">Subtitle or description goes here.</p>
        </div>
        <button class="btn" style="background-color: #0284c7; color: white; padding: 8px 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s;">
          <i class="bi bi-plus-lg" style="margin-right: 4px;"></i> Action
        </button>
      </div>
      
      <div style="background-color: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); min-height: 200px; display: flex; align-items: center; justify-content: center; color: #94a3b8;">
        <p>White content block (tables, grids, forms)</p>
      </div>
    </main>
</body>
</html>
