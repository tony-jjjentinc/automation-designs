<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Navigation - Inline CSS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 12px; width: 224px; background-color: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); z-index: 50; }
        .dropdown:hover .dropdown-menu { display: block; animation: scaleIn 0.2s ease-out; }
        .dropdown-trigger:hover { background-color: #f8fafc; border-color: #e2e8f0; }
        .dropdown-trigger:hover .caret { transform: rotate(180deg); }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 8px 16px; font-size: 14px; color: #475569; text-decoration: none; font-weight: 500; transition: all 0.2s; }
        .menu-item:hover { background-color: #f8fafc; color: #0284c7; }
        .menu-item.danger:hover { background-color: #fef2f2; color: #b91c1c; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 768px) { .hide-mobile { display: none !important; } .show-mobile { display: block !important; } }
        .show-mobile { display: none; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 40;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei2.png" alt="Logo" style="height: 32px; object-fit: contain; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));" />
      </div>
      <div class="dropdown">
        <div class="dropdown-trigger" style="display: flex; align-items: center; gap: 12px; padding: 6px 12px; border-radius: 9999px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s;">
          <div class="hide-mobile" style="text-align: right;">
            <div style="font-size: 14px; font-weight: 600; color: #1e293b; line-height: 1.2;">Arthur Peterson</div>
            <div style="font-size: 12px; color: #0284c7; font-weight: 500;">Administrator</div>
          </div>
          <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(to top right, #0284c7, #4f46e5); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid rgba(3, 105, 161, 0.2);">
            A
          </div>
          <i class="bi bi-chevron-down caret" style="color: #94a3b8; font-size: 12px; margin-left: 4px; transition: transform 0.2s;"></i>
        </div>
        <div class="dropdown-menu">
          <div class="show-mobile" style="padding: 12px 16px; border-bottom: 1px solid #f1f5f9; margin-bottom: 8px;">
            <div style="font-size: 14px; font-weight: bold; color: #1e293b;">Arthur Peterson</div>
            <div style="font-size: 12px; color: #0284c7;">Administrator</div>
          </div>
          <a href="#" class="menu-item">
            <i class="bi bi-person" style="font-size: 18px; color: #94a3b8;"></i> My Profile
          </a>
          <a href="#" class="menu-item">
            <i class="bi bi-gear" style="font-size: 18px; color: #94a3b8;"></i> Settings
          </a>
          <div style="border-top: 1px solid #f1f5f9; margin: 8px 0;"></div>
          <a href="#" class="menu-item danger" style="color: #dc2626;">
            <i class="bi bi-box-arrow-right" style="font-size: 18px;"></i> Sign Out
          </a>
        </div>
      </div>
    </header>
</body>
</html>
