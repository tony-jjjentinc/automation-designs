<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Inline CSS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background-color: #f8fafc; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 16px; }
        * { box-sizing: border-box; }
        .input-field:focus { outline: none; box-shadow: 0 0 0 2px #2563eb; border-color: #2563eb; }
        .btn:hover { background-color: #1d4ed8; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: 1fr 1fr; } body { padding: 32px; } }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 672px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); padding: 24px; border: 1px solid rgba(255, 255, 255, 0.4); z-index: 10;">
      <div style="margin-bottom: 32px; display: flex; justify-content: center; align-items: center;">
        <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei.png" alt="Company Logo" style="height: 160px; object-fit: cover; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));" />
      </div>
      <div style="text-align: center; margin-bottom: 32px;">
        <h1 style="font-size: 24px; font-weight: bold; color: #0f172a; margin: 0; letter-spacing: -0.025em;">Equipment Status Report</h1>
        <p style="color: #64748b; margin-top: 8px; font-size: 14px;">Facilities &gt; Architectural, Civil, & Structural</p>
      </div>
      <div style="width: 100%; border-top: 1px solid #e2e8f0; margin: 32px 0;"></div>
      
      <form style="display: flex; flex-direction: column; gap: 24px;">
        <div class="grid-container">
          <div>
            <label style="display: block; color: #475569; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;">Equipment ID</label>
            <input type="text" class="input-field" required style="width: 100%; padding: 12px 16px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; transition: box-shadow 0.2s;" placeholder="e.g. AC-HVAC-01" />
          </div>
          <div>
            <label style="display: block; color: #475569; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;">Equipment Name</label>
            <input type="text" class="input-field" required style="width: 100%; padding: 12px 16px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; transition: box-shadow 0.2s;" placeholder="e.g. Main Chiller Unit" />
          </div>
        </div>
        <div>
          <label style="display: block; color: #475569; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;">Current Status</label>
          <div style="position: relative;">
            <select class="input-field" required style="width: 100%; padding: 12px 16px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; appearance: none; font-weight: 500; transition: box-shadow 0.2s;">
              <option value="" disabled selected>Select status...</option>
              <option value="Operational">🟢 Operational</option>
              <option value="Maintenance">🟡 Needs Maintenance</option>
              <option value="Out of Order">🔴 Out of Order / Critical</option>
            </select>
            <i class="bi bi-chevron-down" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none;"></i>
          </div>
        </div>
        <div>
          <label style="display: block; color: #475569; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;">Remarks / Issues</label>
          <textarea class="input-field" required style="width: 100%; padding: 12px 16px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; height: 112px; resize: none; transition: box-shadow 0.2s;" placeholder="Describe the current condition or any visible damage..."></textarea>
        </div>
        <button type="button" class="btn" style="width: 100%; padding: 16px; background-color: #2563eb; color: white; font-weight: bold; border: none; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); cursor: pointer; transition: background-color 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;">
          Submit Report <i class="bi bi-send"></i>
        </button>
      </form>
    </div>
</body>
</html>
