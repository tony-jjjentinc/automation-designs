<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#082f49' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
    <div class="min-h-screen flex flex-col justify-center items-center p-4 md:p-8 relative">
      <div class="w-full max-w-2xl bg-white/95 backdrop-blur-2xl rounded-3xl shadow-2xl p-6 md:p-10 z-10 border border-white/40">
        <div class="mb-2 z-10 mb-8 flex justify-center items-center">
          <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei.png" alt="Company Logo" class="h-40 object-cover drop-shadow-lg" />
        </div>
        <div class="text-center mb-8">
          <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Equipment Status Report</h1>
          <p class="text-slate-500 mt-2 text-sm md:text-base">Facilities &gt; Architectural, Civil, & Structural</p>
        </div>
        <div class="w-full border my-8"></div>
        <form class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-slate-600 text-xs font-bold uppercase tracking-wider mb-2 ml-1">Equipment ID</label>
              <input type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none text-slate-800 transition-shadow shadow-sm placeholder-slate-400" placeholder="e.g. AC-HVAC-01" />
            </div>
            <div>
              <label class="block text-slate-600 text-xs font-bold uppercase tracking-wider mb-2 ml-1">Equipment Name</label>
              <input type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none text-slate-800 transition-shadow shadow-sm placeholder-slate-400" placeholder="e.g. Main Chiller Unit" />
            </div>
          </div>
          <div>
            <label class="block text-slate-600 text-xs font-bold uppercase tracking-wider mb-2 ml-1">Current Status</label>
            <div class="relative">
              <select required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none text-slate-800 appearance-none transition-shadow shadow-sm font-medium">
                <option value="" disabled selected>Select status...</option>
                <option value="Operational">🟢 Operational</option>
                <option value="Maintenance">🟡 Needs Maintenance</option>
                <option value="Out of Order">🔴 Out of Order / Critical</option>
              </select>
              <i class="bi bi-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
            </div>
          </div>
          <div>
            <label class="block text-slate-600 text-xs font-bold uppercase tracking-wider mb-2 ml-1">Remarks / Issues</label>
            <textarea required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none text-slate-800 transition-shadow shadow-sm placeholder-slate-400 resize-none h-28" placeholder="Describe the current condition or any visible damage..."></textarea>
          </div>
          <button type="button" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transition-all duration-200 flex justify-center items-center gap-2">
            Submit Report <i class="bi bi-send"></i>
          </button>
        </form>
      </div>
    </div>
</body>
</html>
