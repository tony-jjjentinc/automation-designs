<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#082f49' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div class="flex flex-col min-h-screen bg-slate-50 relative overflow-hidden">
      <header class="flex justify-between items-center px-6 py-4 bg-white/90 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40">
        <div class="flex items-center gap-3">
          <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei2.png" alt="Logo" class="h-8 object-contain drop-shadow-sm" />
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md text-sm border border-brand-700/20">A</div>
      </header>
      
      <main class="flex-grow p-6 w-full max-w-5xl mx-auto z-10">
        <div class="flex justify-between items-end mb-6">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Page Title</h1>
            <p class="text-slate-500 text-sm mt-1">Subtitle or description goes here.</p>
          </div>
          <button class="bg-brand-600 hover:bg-brand-700 transition-colors text-white px-4 py-2 rounded-xl text-sm font-medium">
            <i class="bi bi-plus-lg"></i> Action
          </button>
        </div>
        
        <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm min-h-[200px] flex items-center justify-center text-slate-400">
          <p>White content block (tables, grids, forms)</p>
        </div>
      </main>
    </div>
</body>
</html>
