<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Navigation - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#082f49' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { background-color: #f8fafc; margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <header class="flex justify-between items-center px-6 py-4 bg-white/90 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei2.png" alt="Logo" class="h-8 object-contain drop-shadow-sm" />
      </div>
      <div class="relative group">
        <div class="flex items-center gap-3 px-3 py-1.5 rounded-full hover:bg-slate-50 transition-colors cursor-pointer border border-transparent hover:border-slate-200">
          <div class="text-right hidden md:block">
            <div class="text-sm font-semibold text-slate-800 leading-tight">Arthur Peterson</div>
            <div class="text-xs text-brand-600 font-medium">Administrator</div>
          </div>
          <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md text-sm border border-brand-700/20">
            A
          </div>
          <i class="bi bi-chevron-down text-slate-400 text-xs ml-1 transition-transform duration-200 group-hover:rotate-180"></i>
        </div>
        <div class="absolute right-0 mt-3 w-56 bg-white border border-slate-200 rounded-xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right scale-95 group-hover:scale-100 z-50">
          <div class="px-4 py-3 border-b border-slate-100 mb-2 md:hidden">
            <div class="text-sm font-bold text-slate-800">Arthur Peterson</div>
            <div class="text-xs text-brand-600">Administrator</div>
          </div>
          <a href="#" class="block px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors flex items-center gap-3 font-medium">
            <i class="bi bi-person text-lg text-slate-400"></i> My Profile
          </a>
          <a href="#" class="block px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-brand-600 transition-colors flex items-center gap-3 font-medium">
            <i class="bi bi-gear text-lg text-slate-400"></i> Settings
          </a>
          <div class="border-t border-slate-100 my-2"></div>
          <a href="#" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors flex items-center gap-3 font-medium">
            <i class="bi bi-box-arrow-right text-lg"></i> Sign Out
          </a>
        </div>
      </div>
    </header>
</body>
</html>
