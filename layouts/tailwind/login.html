<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Overlay - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#082f49' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div class="fixed inset-0 flex flex-col justify-center items-center bg-slate-900 z-50 p-4">
      <img src="https://tony-jjjentinc.github.io/automation-designs/assets/images/jjjei2.png" alt="Logo" class="h-16 object-contain mb-6 animate-[fadeIn_0.5s_ease-out] z-10" />
      
      <div class="w-full max-w-md p-8 bg-white border border-slate-200 rounded-xl shadow-md animate-[slideUp_0.5s_ease-out] z-10">
        <h4 class="text-xl font-medium text-center text-slate-900 mb-1 tracking-tight">System Login</h4>
        <p class="text-xs text-center text-slate-500 mb-6">2026 - v3.2</p>
        
        <form class="space-y-4">
          <div>
            <input type="email" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-md focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-slate-900 placeholder-slate-400 outline-none transition-all" placeholder="Email" required />
          </div>
          <div>
            <input type="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-md focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-slate-900 placeholder-slate-400 outline-none transition-all" placeholder="Password" required />
          </div>
          <button type="button" class="w-full py-3 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-medium rounded-md transition-all duration-200 mt-2">
            Login
          </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-500 bg-slate-50 py-2 rounded-md border border-slate-100">
          <span class="block mb-1 text-xs uppercase tracking-wider font-bold text-slate-400">Demo Credentials</span>
          <span class="font-medium text-slate-700">user@example.com</span> / <span class="font-medium text-slate-700">password</span>
        </div>
      </div>
    </div>
    <style>
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</body>
</html>
